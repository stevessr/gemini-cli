<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini CLI Web Service</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #2d2d2d;
            padding: 1rem;
            border-bottom: 1px solid #444;
        }

        .header h1 {
            color: #4285f4;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .workspace-selector {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .workspace-input {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .workspace-input input {
            background: #3a3a3a;
            border: 1px solid #555;
            color: #e0e0e0;
            padding: 0.5rem;
            border-radius: 4px;
            min-width: 300px;
        }

        .workspace-input button {
            background: #4285f4;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
        }

        .workspace-input button:hover {
            background: #3367d6;
        }

        .auth-selector {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .auth-selector select {
            background: #3a3a3a;
            border: 1px solid #555;
            color: #e0e0e0;
            padding: 0.5rem;
            border-radius: 4px;
        }

        .settings-toggle {
            background: #555;
            color: white;
            border: none;
            padding: 0.5rem;
            border-radius: 4px;
            cursor: pointer;
        }

        .settings-panel {
            display: none;
            background: #2a2a2a;
            padding: 1rem;
            border-bottom: 1px solid #444;
        }

        .settings-panel.active {
            display: block;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1rem;
        }

        .setting-group {
            background: #3a3a3a;
            padding: 1rem;
            border-radius: 4px;
        }

        .setting-group h3 {
            margin-bottom: 0.5rem;
            color: #4285f4;
        }

        .setting-row {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .setting-row label {
            min-width: 120px;
        }

        .setting-row input, .setting-row select {
            flex: 1;
            background: #2a2a2a;
            border: 1px solid #555;
            color: #e0e0e0;
            padding: 0.25rem;
            border-radius: 4px;
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .workspace-list {
            width: 250px;
            background: #2a2a2a;
            border-right: 1px solid #444;
            overflow-y: auto;
        }

        .workspace-item {
            padding: 1rem;
            border-bottom: 1px solid #333;
            cursor: pointer;
        }

        .workspace-item:hover {
            background: #333;
        }

        .workspace-item.active {
            background: #4285f4;
        }

        .workspace-name {
            font-weight: bold;
            margin-bottom: 0.25rem;
        }

        .workspace-path {
            font-size: 0.8rem;
            color: #aaa;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .message {
            margin-bottom: 1rem;
            padding: 1rem;
            border-radius: 8px;
            max-width: 80%;
        }

        .message.user {
            background: #4285f4;
            color: white;
            margin-left: auto;
        }

        .message.ai {
            background: #3a3a3a;
            color: #e0e0e0;
        }

        .message-content {
            white-space: pre-wrap;
            line-height: 1.5;
        }

        .message-timestamp {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-top: 0.5rem;
        }

        .pending-approvals {
            background: #2a2a2a;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 1rem;
            margin: 1rem 0;
        }

        .approval-item {
            background: #3a3a3a;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 0.5rem;
        }

        .approval-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .approval-actions button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .approve-btn {
            background: #34a853;
            color: white;
        }

        .reject-btn {
            background: #ea4335;
            color: white;
        }

        .chat-input {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            background: #2d2d2d;
            border-top: 1px solid #444;
        }

        .chat-input textarea {
            flex: 1;
            background: #3a3a3a;
            border: 1px solid #555;
            color: #e0e0e0;
            padding: 0.75rem;
            border-radius: 4px;
            resize: none;
            min-height: 60px;
            font-family: inherit;
        }

        .chat-input button {
            background: #4285f4;
            color: white;
            border: none;
            padding: 0.75rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            align-self: flex-end;
        }

        .chat-input button:hover {
            background: #3367d6;
        }

        .auto-approve-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #3a3a3a;
            padding: 0.5rem;
            border-radius: 4px;
        }

        .auto-approve-toggle input[type="checkbox"] {
            margin: 0;
        }

        .loading {
            opacity: 0.5;
            pointer-events: none;
        }

        .error {
            background: #ea4335;
            color: white;
            padding: 0.5rem;
            border-radius: 4px;
            margin: 0.5rem 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Gemini CLI Web Service</h1>
        <div class="workspace-selector">
            <div class="workspace-input">
                <input type="text" id="workspace-path" placeholder="Enter workspace path..." value="/tmp">
                <button onclick="createWorkspace()">Create Workspace</button>
            </div>
            <div class="auth-selector">
                <select id="auth-type">
                    <option value="">No Authentication</option>
                    <option value="GeminiApiKey">Gemini API Key</option>
                    <option value="VertexAi">Vertex AI</option>
                    <option value="ExistingLogin">Existing Login</option>
                </select>
            </div>
            <button class="settings-toggle" onclick="toggleSettings()">Settings</button>
        </div>
    </div>

    <div class="settings-panel" id="settings-panel">
        <div class="settings-grid">
            <div class="setting-group">
                <h3>Gemini API Key</h3>
                <div class="setting-row">
                    <label>API Key:</label>
                    <input type="password" id="gemini-api-key" placeholder="Enter your Gemini API key">
                </div>
            </div>
            <div class="setting-group">
                <h3>Vertex AI</h3>
                <div class="setting-row">
                    <label>Project ID:</label>
                    <input type="text" id="vertex-project-id" placeholder="your-project-id">
                </div>
                <div class="setting-row">
                    <label>Location:</label>
                    <input type="text" id="vertex-location" placeholder="us-central1" value="us-central1">
                </div>
            </div>
            <div class="setting-group">
                <h3>Existing Login</h3>
                <div class="setting-row">
                    <label>Login Path:</label>
                    <input type="text" id="existing-login-path" placeholder="/path/to/login/file">
                </div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="workspace-list" id="workspace-list">
            <div class="workspace-item">
                <div class="workspace-name">No workspaces</div>
                <div class="workspace-path">Create a workspace to get started</div>
            </div>
        </div>

        <div class="chat-container">
            <div class="chat-messages" id="chat-messages">
                <div class="message ai">
                    <div class="message-content">Welcome to Gemini CLI Web Service! Create a workspace and start chatting.</div>
                    <div class="message-timestamp">Just now</div>
                </div>
            </div>

            <div class="pending-approvals" id="pending-approvals" style="display: none;">
                <h3>Pending Tool Approvals</h3>
                <div id="approval-list"></div>
            </div>

            <div class="chat-input">
                <div class="auto-approve-toggle">
                    <input type="checkbox" id="auto-approve">
                    <label for="auto-approve">Auto-approve tools</label>
                </div>
                <textarea id="message-input" placeholder="Type your message here..." rows="2"></textarea>
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        let currentSessionId = null;
        let currentWorkspaceId = null;
        let workspaces = [];
        let pendingApprovals = [];

        function toggleSettings() {
            const panel = document.getElementById('settings-panel');
            panel.classList.toggle('active');
        }

        function getAuthConfig() {
            const authType = document.getElementById('auth-type').value;
            if (!authType) return null;

            switch (authType) {
                case 'GeminiApiKey':
                    return {
                        api_key: document.getElementById('gemini-api-key').value
                    };
                case 'VertexAi':
                    return {
                        project_id: document.getElementById('vertex-project-id').value,
                        location: document.getElementById('vertex-location').value
                    };
                case 'ExistingLogin':
                    return {
                        login_path: document.getElementById('existing-login-path').value
                    };
                default:
                    return null;
            }
        }

        async function createWorkspace() {
            const workspacePath = document.getElementById('workspace-path').value;
            const authType = document.getElementById('auth-type').value;
            const authConfig = getAuthConfig();

            if (!workspacePath) {
                alert('Please enter a workspace path');
                return;
            }

            try {
                const response = await fetch('/api/sessions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        workspace_path: workspacePath,
                        auth_type: authType || null,
                        auth_config: authConfig
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                currentSessionId = data.session_id;
                currentWorkspaceId = data.workspace_id;

                await loadWorkspaces();
                addMessage('System', 'Workspace created successfully!', false);
            } catch (error) {
                console.error('Error creating workspace:', error);
                addMessage('Error', `Failed to create workspace: ${error.message}`, false);
            }
        }

        async function loadWorkspaces() {
            try {
                const response = await fetch('/api/workspaces');
                workspaces = await response.json();
                renderWorkspaces();
            } catch (error) {
                console.error('Error loading workspaces:', error);
            }
        }

        function renderWorkspaces() {
            const workspaceList = document.getElementById('workspace-list');
            
            if (workspaces.length === 0) {
                workspaceList.innerHTML = `
                    <div class="workspace-item">
                        <div class="workspace-name">No workspaces</div>
                        <div class="workspace-path">Create a workspace to get started</div>
                    </div>
                `;
                return;
            }

            workspaceList.innerHTML = workspaces.map(workspace => `
                <div class="workspace-item ${workspace.id === currentWorkspaceId ? 'active' : ''}" 
                     onclick="selectWorkspace('${workspace.id}')">
                    <div class="workspace-name">${workspace.name}</div>
                    <div class="workspace-path">${workspace.path}</div>
                    <div class="workspace-sessions">${workspace.active_sessions} active sessions</div>
                </div>
            `).join('');
        }

        function selectWorkspace(workspaceId) {
            // TODO: Create new session for selected workspace
            console.log('Selecting workspace:', workspaceId);
        }

        function addMessage(sender, content, isUser) {
            const messagesContainer = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;
            
            const timestamp = new Date().toLocaleTimeString();
            messageDiv.innerHTML = `
                <div class="message-content">${content}</div>
                <div class="message-timestamp">${timestamp}</div>
            `;
            
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        async function sendMessage() {
            const messageInput = document.getElementById('message-input');
            const autoApprove = document.getElementById('auto-approve').checked;
            const message = messageInput.value.trim();

            if (!message || !currentSessionId) {
                if (!currentSessionId) {
                    alert('Please create a workspace first');
                }
                return;
            }

            messageInput.value = '';
            addMessage('You', message, true);

            try {
                const response = await fetch(`/api/sessions/${currentSessionId}/messages`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        content: message,
                        auto_approve: autoApprove
                    })
                });

                const data = await response.json();
                
                if (data.response) {
                    addMessage('Gemini', data.response, false);
                }

                if (data.pending_approvals && data.pending_approvals.length > 0) {
                    showPendingApprovals(data.pending_approvals);
                }
            } catch (error) {
                console.error('Error sending message:', error);
                addMessage('Error', `Failed to send message: ${error.message}`, false);
            }
        }

        function showPendingApprovals(approvals) {
            pendingApprovals = approvals;
            const approvalsContainer = document.getElementById('pending-approvals');
            const approvalList = document.getElementById('approval-list');

            if (approvals.length === 0) {
                approvalsContainer.style.display = 'none';
                return;
            }

            approvalsContainer.style.display = 'block';
            approvalList.innerHTML = approvals.map(approval => `
                <div class="approval-item">
                    <h4>${approval.tool_name}</h4>
                    <p>${approval.description}</p>
                    <pre>${JSON.stringify(approval.tool_args, null, 2)}</pre>
                    <div class="approval-actions">
                        <button class="approve-btn" onclick="handleApproval('${approval.id}', true)">Approve</button>
                        <button class="reject-btn" onclick="handleApproval('${approval.id}', false)">Reject</button>
                    </div>
                </div>
            `).join('');
        }

        async function handleApproval(approvalId, approved) {
            try {
                await fetch(`/api/sessions/${currentSessionId}/approve`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        approval_id: approvalId,
                        approved: approved,
                        auto_approve_future: null
                    })
                });

                // Remove the approval from the list
                pendingApprovals = pendingApprovals.filter(a => a.id !== approvalId);
                showPendingApprovals(pendingApprovals);

                addMessage('System', `Tool ${approved ? 'approved' : 'rejected'}`, false);
            } catch (error) {
                console.error('Error handling approval:', error);
                addMessage('Error', `Failed to handle approval: ${error.message}`, false);
            }
        }

        // Handle Enter key in message input
        document.getElementById('message-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Load workspaces on page load
        loadWorkspaces();
    </script>
</body>
</html>
